<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>商品コードスキャン</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #000; color: #fff; height: 100vh; display: flex; justify-content: center; overflow: hidden; }

  #app-container {
    width: 100%; max-width: 800px; height: 100%;
    display: flex; flex-direction: column; background: #111;
  }

  #header { padding: 15px; background: #1a1a1a; text-align: center; border-bottom: 1px solid #333; z-index: 20; }
  #header h1 { font-size: 18px; font-weight: 700; color: #F0A500; }
  #header p { font-size: 12px; color: #888; margin-top: 4px; }

  #camera-section {
    position: relative; width: 100%; height: 60vh;
    background: #000; overflow: hidden;
    display: flex; justify-content: center; align-items: center;
  }

  #reader video {
    width: 100% !important;
    height: 100% !important;
    object-fit: cover;
    filter: contrast(1.2) brightness(1.1);
  }

  #reader { width: 100%; height: 100%; }
  #qr-shaded-region { display: none !important; }

  #snapshot {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    object-fit: cover; display: none; z-index: 5;
  }

  /* Code39は横長なので枠を広く・低めに */
  #aim-frame {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 90%; max-width: 560px; height: 130px;
    border: 3px solid #F0A500; border-radius: 12px;
    pointer-events: none; z-index: 10;
    box-shadow: 0 0 0 4000px rgba(0,0,0,0.55), inset 0 0 15px rgba(240,165,0,0.3);
    transition: all 0.3s ease;
  }

  #aim-frame.success {
    border-color: #4caf50; background: rgba(76,175,80,0.2);
    box-shadow: 0 0 0 4000px rgba(0,0,0,0.7), inset 0 0 20px rgba(76,175,80,0.5);
  }

  #scanline {
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: #F0A500; animation: sc 2s linear infinite;
    box-shadow: 0 0 10px #F0A500;
  }

  #aim-frame.success #scanline { display: none; }
  @keyframes sc { 0% { top: 0%; } 100% { top: 100%; } }

  /* 角の強調 */
  #aim-frame::before, #aim-frame::after,
  #aim-frame .corner-bl, #aim-frame .corner-br {
    content: ''; position: absolute; width: 20px; height: 20px;
    border-color: #F0A500; border-style: solid;
  }
  #aim-frame::before { top: -3px; left: -3px; border-width: 4px 0 0 4px; border-radius: 12px 0 0 0; }
  #aim-frame::after  { top: -3px; right: -3px; border-width: 4px 4px 0 0; border-radius: 0 12px 0 0; }
  #aim-frame .corner-bl { bottom: -3px; left: -3px; border-width: 0 0 4px 4px; border-radius: 0 0 0 12px; }
  #aim-frame .corner-br { bottom: -3px; right: -3px; border-width: 0 4px 4px 0; border-radius: 0 0 12px 0; }

  #action-section {
    flex: 1; padding: 20px; background: #111;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
  }

  #status-msg {
    font-size: 15px; font-weight: bold; color: #F0A500;
    margin-bottom: 16px; text-align: center; line-height: 1.5;
  }

  #result-ui { width: 100%; display: none; animation: fadeIn 0.3s; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  #code-display {
    width: 100%; background: #222; border: 2px solid #4caf50;
    border-radius: 12px; padding: 14px; margin-bottom: 10px;
    text-align: center;
  }
  #code-display .label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
  #code-display .value { font-size: 32px; font-family: 'Courier New', monospace; font-weight: bold; letter-spacing: 4px; color: #fff; }

  #einput {
    width: 100%; font-size: 24px; font-family: 'Courier New', monospace; font-weight: bold;
    letter-spacing: 3px; padding: 12px; border-radius: 12px;
    border: 2px solid #555; background: #1a1a1a; color: #fff;
    text-align: center; margin-bottom: 16px; outline: none;
    text-transform: uppercase;
  }
  #einput:focus { border-color: #F0A500; }

  #edit-hint { font-size: 12px; color: #666; text-align: center; margin-bottom: 16px; }

  .btns { display: flex; gap: 12px; width: 100%; }
  .btn { flex: 1; padding: 16px; border-radius: 12px; font-size: 17px; font-weight: bold; border: none; cursor: pointer; transition: opacity 0.2s; }
  .btn:active { opacity: 0.7; }
  .b-ok    { background: #185FA5; color: #fff; }
  .b-retry { background: #444; color: #fff; }

  #close-btn-wrap { margin-top: auto; padding-top: 16px; width: 100%; }
  .b-close { width: 100%; padding: 14px; border-radius: 12px; background: #1a1a1a; color: #888; border: 1px solid #333; font-weight: bold; cursor: pointer; font-size: 15px; }

  #err-msg { color: #ff5252; font-size: 13px; text-align: center; margin-bottom: 10px; min-height: 18px; }
</style>
</head>
<body>
<div id="app-container">
  <div id="header">
    <h1>📦 商品コードスキャン</h1>
    <p>Code39 対応 ／ 英字3桁 ＋ 数字5桁</p>
  </div>

  <div id="camera-section">
    <div id="reader"></div>
    <img id="snapshot" alt="スキャン結果">
    <div id="aim-frame">
      <div id="scanline"></div>
      <div class="corner-bl"></div>
      <div class="corner-br"></div>
    </div>
  </div>

  <div id="action-section">
    <div id="status-msg">カメラを起動中...</div>

    <div id="result-ui">
      <div id="code-display">
        <div class="label">読み取り結果</div>
        <div class="value" id="code-val">—</div>
      </div>
      <input type="text" id="einput" maxlength="8" placeholder="手入力・修正はここで"
        oninput="this.value=this.value.toUpperCase().replace(/\*/g,'')"
        onkeydown="if(event.key==='Enter')doConfirm()">
      <div id="err-msg"></div>
      <div class="btns">
        <button class="btn b-ok"    onclick="doConfirm()">✅ 確定</button>
        <button class="btn b-retry" onclick="doRetry()">🔄 再試行</button>
      </div>
    </div>

    <div id="close-btn-wrap">
      <button class="b-close" onclick="doClose()">キャンセルして閉じる</button>
    </div>
  </div>
</div>

<script>
let scanner = null;
let isScanning = true;

// 英字3桁 + 数字5桁（* は除去済みの状態でチェック）
function isValidCode(code) {
  return /^[A-Z]{3}[0-9]{5}$/.test(code);
}

// Code39の * を除去して大文字化
function cleanCode39(raw) {
  return raw.replace(/\*/g, '').trim().toUpperCase();
}

async function startScanner() {
  if (scanner) { try { await scanner.clear(); } catch(e) {} }
  scanner = new Html5Qrcode("reader");

  const config = {
    fps: 15,
    qrbox: (vw, vh) => ({
      width:  Math.floor(Math.min(vw * 0.88, 540)),
      height: 130
    }),
    videoConstraints: {
      facingMode: "environment",
      width:  { ideal: 1920 },
      height: { ideal: 1080 },
      aspectRatio: { ideal: 1.7777777778 }
    },
    experimentalFeatures: { useBarCodeDetectorIfSupported: true },
    // Code39のみに絞ることで誤読を防ぐ
    formatsToSupport: [
      Html5QrcodeSupportedFormats.CODE_39
    ]
  };

  try {
    await scanner.start(
      { facingMode: "environment" },
      config,
      (decodedText) => {
        if (!isScanning) return;
        const clean = cleanCode39(decodedText);
        if (isValidCode(clean)) {
          isScanning = false;
          onSuccess(clean);
        }
        // フォーマット不一致はスルー（スキャン継続）
      },
      () => {}
    );
    document.getElementById('status-msg').innerHTML =
      '枠の中にバーコードを水平に映してください<br>' +
      '<small style="font-weight:normal;opacity:0.8;">少し離すとピントが合いやすくなります</small>';
  } catch (err) {
    document.getElementById('status-msg').textContent = 'カメラ起動エラー: ' + err;
    document.getElementById('status-msg').style.color = '#ff5252';
  }
}

function onSuccess(code) {
  if (navigator.vibrate) navigator.vibrate(100);

  // スナップショット
  try {
    const videoEl = document.querySelector('#reader video');
    if (videoEl) {
      const canvas = document.createElement('canvas');
      canvas.width = videoEl.videoWidth;
      canvas.height = videoEl.videoHeight;
      const ctx = canvas.getContext('2d');
      ctx.filter = 'contrast(1.2)';
      ctx.drawImage(videoEl, 0, 0);
      const snap = document.getElementById('snapshot');
      snap.src = canvas.toDataURL('image/jpeg', 0.8);
      snap.style.display = 'block';
    }
  } catch(e) {}

  if (scanner) scanner.pause(true);

  document.getElementById('aim-frame').classList.add('success');
  document.getElementById('status-msg').style.display = 'none';
  document.getElementById('code-val').textContent = code;
  document.getElementById('einput').value = code;
  document.getElementById('result-ui').style.display = 'block';
  document.getElementById('err-msg').textContent = '';
}

function doRetry() {
  isScanning = true;
  document.getElementById('snapshot').style.display = 'none';
  document.getElementById('aim-frame').classList.remove('success');
  document.getElementById('result-ui').style.display = 'none';
  document.getElementById('status-msg').style.display = 'block';
  document.getElementById('einput').value = '';
  document.getElementById('err-msg').textContent = '';
  if (scanner) scanner.resume();
}

function doConfirm() {
  const raw = document.getElementById('einput').value;
  const val = cleanCode39(raw);
  const errEl = document.getElementById('err-msg');

  if (!isValidCode(val)) {
    errEl.textContent = '⚠ 英字3桁＋数字5桁（例：ASO89074）を入力してください（現在：' + val + '）';
    return;
  }
  errEl.textContent = '';

  if (window.opener) {
    window.opener.postMessage({ type: 'BARCODE_RESULT', barcode: val }, '*');
    window.close();
  } else {
    alert('確定: ' + val);
  }
}

function doClose() {
  if (scanner) {
    scanner.stop().then(() => window.close()).catch(() => window.close());
  } else {
    window.close();
  }
}

window.onload = startScanner;
</script>
</body>
</html>
